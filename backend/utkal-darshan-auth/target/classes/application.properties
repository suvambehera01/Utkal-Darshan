spring.application.name=utkal-darshan-auth
server.port=8088

# =========================
# MySQL config (edit these)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/utkal_darshan?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS (dev)
app.cors.allowed-origins=*

# JWT (bonus) - change secret in production
app.jwt.secret=CHANGE_THIS_SECRET_TO_A_LONG_RANDOM_VALUE
app.jwt.expiration-minutes=120

